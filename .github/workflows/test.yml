name: Test
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        v: [canary, latest, version_124]
    steps:
      - uses: actions/checkout@v7
      - name: Test Action
        uses: ./
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          version: ${{ matrix.v }}
      - name: Version
        run: wasm-opt --version
